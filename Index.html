<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuenta regresiva ❤️</title>

<!-- Librería de confeti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.card{
    background:white;
    padding:30px;
    border-radius:20px;
    width:90%;
    max-width:420px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}
h2{
    margin-bottom:5px;
    color:#e6395b;
}
.subtitulo{
    color:#777;
    margin-bottom:25px;
    font-size:15px;
}
.contador{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}
.bloque{
    background:#fff0f3;
    border-radius:12px;
    padding:12px 10px;
    min-width:65px;
    box-shadow:0 4px 10px rgba(0,0,0,.08);
}
.numero{
    font-size:28px;
    font-weight:bold;
    color:#ff4d6d;
}
.etiqueta{
    font-size:12px;
    color:#888;
    text-transform:uppercase;
    letter-spacing:.5px;
}
#mensajeFinal{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
    color:#e6395b;
}
</style>
</head>
<body>

<div class="card">
    <h2>⏳ Faltan pocas horas para tu cumpleaños mi amor ❤️</h2>
    <div class="subtitulo">20 de junio de 2026</div>

    <div class="contador" id="contador">
        <div class="bloque">
            <div class="numero" id="dias">0</div>
            <div class="etiqueta">Días</div>
        </div>
        <div class="bloque">
            <div class="numero" id="horas">0</div>
            <div class="etiqueta">Horas</div>
        </div>
        <div class="bloque">
            <div class="numero" id="minutos">0</div>
            <div class="etiqueta">Min</div>
        </div>
        <div class="bloque">
            <div class="numero" id="segundos">0</div>
            <div class="etiqueta">Seg</div>
        </div>
    </div>

    <div id="mensajeFinal"></div>
</div>

<script>

// Fecha objetivo: 20 de junio de 2026, 00:00:00
const fechaObjetivo = new Date("2026-06-20T00:00:00").getTime();

let confettiLanzado = false;

function lanzarConfeti(){
    var duration = 4000;
    var end = Date.now() + duration;

    (function frame() {
        confetti({
            particleCount:6,
            angle:60,
            spread:60,
            origin:{x:0}
        });

        confetti({
            particleCount:6,
            angle:120,
            spread:60,
            origin:{x:1}
        });

        if(Date.now() < end){
            requestAnimationFrame(frame);
        }
    }());
}

function actualizarContador(){

    const ahora = new Date().getTime();
    const diferencia = fechaObjetivo - ahora;

    if(diferencia <= 0){

        document.getElementById("contador").style.display = "none";
        document.getElementById("mensajeFinal").innerHTML =
            "🎉 ¡Feliz cumpleaños mi amor! 🎂❤️<br><br>Espero que tengas un día hermoso 😘";

        if(!confettiLanzado){
            lanzarConfeti();
            confettiLanzado = true;
        }

        clearInterval(intervalo);
        return;
    }

    const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
    const horas = Math.floor((diferencia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutos = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
    const segundos = Math.floor((diferencia % (1000 * 60)) / 1000);

    document.getElementById("dias").innerHTML = dias;
    document.getElementById("horas").innerHTML = horas;
    document.getElementById("minutos").innerHTML = minutos;
    document.getElementById("segundos").innerHTML = segundos;
}

actualizarContador();
const intervalo = setInterval(actualizarContador, 1000);

</script>

</body>
</html>
